<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tarjetas Premium Flexbox</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
        
    <header style="text-align: center; margin-top: 20px;">
        <h2>Nuestros planes de IA</h2>
    </header>

    <main class="contenedor-tarjetas">
        
        <article class="tarjeta">
            <h3>Plan Básico</h3>
            <p class="precio">Gratis</p>
            <p>Ideal para probar nuestra IA con 50 mensajes al día.</p>
            <button>Elegir Plan</button>
        </article>
    
        <article class="tarjeta">
            <h3>Plan Pro</h3>
            <p class="precio">15€ / mes</p>
            <p>Mensajes ilimitados y respuestas rápidas.</p>
            <button class="btn-destacado">Elegir Plan Pro</button>
        </article>


    </main>
</body>
</html>
